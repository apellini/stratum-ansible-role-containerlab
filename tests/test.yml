---
- name: Syntax-check stub for apellini.containerlab
  hosts: all
  gather_facts: false
  roles:
    - role: apellini.containerlab
      vars:
        containerlab_version: "0.68.0"
        containerlab_cache_bucket: stub-bucket
        containerlab_topology_dir: /opt/stratum/containerlab
        containerlab_devices:
          - kind: cisco_n9kv
            name: n9kv-1
            image_tag: "9.3.10"
          - kind: cisco_n9kv
            name: n9kv-2
            image_tag: "9.3.10"
        containerlab_links:
          - endpoints: ["n9kv-1:eth1", "n9kv-2:eth1"]
